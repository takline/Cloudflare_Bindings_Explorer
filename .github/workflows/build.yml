name: Build VSIX

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.9

      - name: Install Dependencies
        run: bun install

      - name: Package VSIX
        run: bun run package

      - name: Upload VSIX Artifact
        uses: actions/upload-artifact@v4
        with:
          name: r2-explorer-vsix
          path: '*.vsix'
          if-no-files-found: error
