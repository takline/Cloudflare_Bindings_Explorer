name: VS Code Smoke

on:
  workflow_dispatch:
    inputs:
      run_r2_live_tests:
        description: "Set to 1 to run live R2 integration tests"
        required: false
        default: "0"

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.9

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Install xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: VS Code Smoke Tests
        env:
          RUN_R2_LIVE_TESTS: ${{ github.event.inputs.run_r2_live_tests || '0' }}
        run: xvfb-run -a bun run test
