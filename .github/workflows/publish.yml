name: Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.9

      - name: Install Dependencies
        run: bun install

      - name: Package VSIX
        run: bun run package

      - name: Locate VSIX
        id: vsix
        run: echo "path=$(ls *.vsix | head -n 1)" >> $GITHUB_OUTPUT

      - name: Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: bunx vsce publish -p "$VSCE_PAT" --no-dependencies

      - name: Publish to Open VSX
        env:
          OPEN_VSX_PAT: ${{ secrets.OPEN_VSX_PAT }}
        run: bunx ovsx publish -p "$OPEN_VSX_PAT" --no-dependencies

      - name: Upload VSIX to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.vsix.outputs.path }}
